apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: api-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:5001"
        - name: USER_SERVICE_URL
          value: "http://user-service:5002"
        - name: APPOINTMENT_SERVICE_URL
          value: "http://appointment-service:5003"
        - name: PRESCRIPTION_SERVICE_URL
          value: "http://prescription-service:5004"
